name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: 'This issue has been marked as stale because there has been no activity for 60 days. If this issue is still relevant, please leave a comment. Otherwise, it will be closed in 7 days.'
          stale-pr-message: 'This Pull Request has been marked as stale because there has been no update for 60 days. Please provide an update or this PR will be closed automatically.'
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'bug,enhancement,security'
